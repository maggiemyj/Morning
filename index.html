<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>早安海报</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ========== 页面主体 ========== -->
    <main class="app-container">

        <!-- 顶部工具栏 — 一行排列 -->
        <header class="toolbar top-toolbar">
            <button class="btn-tool" id="btnChangeImage" title="换一张背景图">换图</button>
            <button class="btn-tool" id="btnUploadImage" title="上传自定义图片">上传</button>
            <button class="btn-tool" id="btnSwitchFont" title="换个字体风格">字体</button>
            <button class="btn-tool" id="btnTemplate" title="切换海报模板">模板</button>
            <button class="btn-tool" id="btnSwitchBlessing" title="换一句祝福语">换句</button>
        </header>

        <!-- 海报区域 -->
        <div class="poster-wrapper" id="posterWrapper">
            <div class="poster" id="poster">

                <!-- 图片区（上方） -->
                <div class="poster-image-zone" id="posterImageZone">
                    <img class="poster-image" id="posterImage" alt="背景图">
                    <!-- 图片加载中 -->
                    <div class="poster-image-loading" id="posterImageLoading">加载中…</div>
                    <!-- 拖拽定位重置按钮 -->
                    <button class="crop-reset-btn" id="cropResetBtn" title="恢复居中">↺</button>
                </div>

                <!-- 信息区（下方） -->
                <div class="poster-info-zone">
                    <div class="poster-content">

                        <!-- 天气 -->
                        <div class="poster-weather" id="posterWeather">
                            <span class="weather-icon" id="weatherIcon">☀️</span>
                            <span class="weather-text" id="weatherText">晴 18°C</span>
                        </div>

                        <!-- 日期 -->
                        <div class="poster-date" id="posterDate">
                            2026年7月3日 星期五
                        </div>

                        <!-- 早安大字（预渲染PNG，无需加载字体） -->
                        <div class="poster-morning">
                            <img class="morning-img" id="morningImg" src="assets/fonts/mashan.png" alt="早安">
                            <img class="morning-char morning-char-zao" id="morningCharZao" src="assets/fonts/mashan_zao.png" alt="早">
                            <img class="morning-char morning-char-an" id="morningCharAn" src="assets/fonts/mashan_an.png" alt="安">
                        </div>

                        <!-- 祝福语（可点击编辑） -->
                        <div class="poster-blessing" id="posterBlessing">
                            <p class="blessing-text" id="blessingText"
                               title="点击编辑祝福语">愿你今天心情如阳光般灿烂！</p>
                            <!-- 编辑模式 -->
                            <textarea class="blessing-edit" id="blessingEdit"
                                      placeholder="输入你的祝福语…" rows="2"></textarea>
                            <div class="blessing-edit-actions" id="blessingEditActions">
                                <button class="btn-edit-action btn-edit-save" id="btnEditSave">✓ 确定</button>
                                <button class="btn-edit-action btn-edit-cancel" id="btnEditCancel">取消</button>
                                <button class="btn-edit-action btn-edit-reset" id="btnEditReset">恢复系统</button>
                            </div>
                        </div>

                    </div><!-- /poster-content -->

                    <!-- 作者署名 -->
                    <div class="poster-author">
                        <img
                            class="author-avatar"
                            id="authorAvatar"
                            src="assets/laowang.jpg"
                            alt="头像"
                            onerror="this.style.display='none'"
                        >
                        <span class="author-name" id="authorName">玲珑</span>
                    </div>
                </div><!-- /poster-info-zone -->

            </div><!-- /poster -->
        </div><!-- /poster-wrapper -->

        <!-- 底部操作栏 -->
        <footer class="toolbar bottom-toolbar">
            <button class="btn-action" id="btnSave">保存图片</button>
            <button class="btn-action btn-action-primary" id="btnShare">分享</button>
        </footer>

        <!-- 隐藏的文件上传 input -->
        <input type="file" id="fileInput" accept="image/*" style="display:none">

    </main>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 模板选择弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalTemplate">
            <h3 class="modal-title">选择海报模板</h3>
            <div class="template-list" id="templateList"></div>
            <button class="btn btn-block btn-primary" id="btnCloseModal">关闭</button>
        </div>
    </div>

    <!-- ========== 业务 JS ========== -->
    <script src="js/blessings.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/fonts.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/image-crop.js"></script>
    <script src="js/share.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
